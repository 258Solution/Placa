<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Elves Microcrédito - App Fullscreen</title>
<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: Arial, sans-serif;
  background: #0b0b0b;
  color: #fff;
}

body {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* APP CARD FULL SCREEN */
.app-card {
  background: #111;
  width: 100%;
  height: 100vh;           /* ocupa toda a altura da tela */
  padding: 25px 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 15px;
  overflow-y: auto;        /* permite rolar se necessário */
}

/* LOGO */
.logo {
  font-size: 28px;
  font-weight: bold;
  text-align: center;
}
.logo span {
  color: #25D366;
}

/* TÍTULOS */
h3 {
  color: #25D366;
  margin: 10px 0;
  text-align: center;
}

/* INPUTS E TEXTAREA */
input, textarea, button {
  width: 100%;
  padding: 16px;
  border-radius: 12px;
  border: none;
  font-size: 18px;
  box-sizing: border-box;
}

textarea {
  min-height: 120px;
}

input[readonly] {
  background: #1c1c1c;
  color: #25D366;
  font-weight: bold;
}

/* BOTÕES */
button {
  background: #25D366;
  color: #000;
  font-weight: bold;
  font-size: 20px;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #1ed65c;
}

/* RESUMO */
#resumo {
  display: none;
  background: #111;
  padding: 20px;
  border-radius: 12px;
  width: 100%;
  box-shadow: 0 0 15px #25D36655;
  margin-top: 15px;
  text-align: left;
}

/* RESPONSIVO */
@media screen and (max-width: 450px) {
  input, textarea, button {
    font-size: 16px;
    padding: 14px;
  }
  h3 {
    font-size: 18px;
  }
}
</style>
</head>
<body>

<div class="app-card">
  <div class="logo">ELVES <span>MICROCRÉDITO</span></div>

  <h3>📋 Dados do Cliente</h3>
  <input id="nome" placeholder="Nome completo">
  <input id="telefone" placeholder="Telefone (WhatsApp)">
  <input id="valor" type="number" placeholder="Valor solicitado" oninput="calcular()">
  <input id="total" placeholder="Valor a devolver (30%)" readonly>
  <input id="prazo" type="number" placeholder="Prazo (dias)">
  <input id="localizacao" placeholder="Localização">

  <h3>📦 Dados do Penhor</h3>
  <input id="penhora" placeholder="Tipo de penhor (ex: TV, celular, mota)">
  <textarea id="descricaoPenhor" placeholder="Descrição do penhor (marca, estado, defeitos, acessórios, etc.)"></textarea>

  <button onclick="mostrarResumo()">Ver informações</button>

  <div id="resumo"></div>

  <button id="confirmar" style="display:none" onclick="enviar()">Confirmar e Enviar</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script>
emailjs.init("RLXkiuuqrtbVht4uM");
const WHATSAPP_NUMERO = "258870419940";

function calcular() {
  let v = Number(document.getElementById("valor").value);
  document.getElementById("total").value = v > 0 ? (v * 1.3).toFixed(2) : "";
}

function mostrarResumo() {
  const resumo = document.getElementById("resumo");
  resumo.style.display = "block";
  document.getElementById("confirmar").style.display = "block";

  resumo.innerHTML = `
    <h3>🔍 Confirmação dos Dados</h3>
    <p><b>Nome:</b> ${nome.value}</p>
    <p><b>WhatsApp:</b> ${telefone.value}</p>
    <p><b>Valor solicitado:</b> ${valor.value}</p>
    <p><b>Total a devolver:</b> ${total.value}</p>
    <p><b>Prazo:</b> ${prazo.value} dias</p>
    <p><b>Localização:</b> ${localizacao.value}</p>
    <p><b>Penhor:</b> ${penhora.value}</p>
    <p><b>Descrição do penhor:</b><br>${descricaoPenhor.value}</p>
  `;
}

function enviar() {
  const mensagem = `
📄 SOLICITAÇÃO DE EMPRÉSTIMO
🏦 ELVES MICROCRÉDITO

👤 Nome: ${nome.value}
📞 WhatsApp: ${telefone.value}

💰 Valor solicitado: ${valor.value}
📈 Total a devolver: ${total.value}
⏳ Prazo: ${prazo.value} dias

📍 Localização: ${localizacao.value}

📦 Penhor: ${penhora.value}
📝 Descrição: ${descricaoPenhor.value}
`;

  window.open(
    "https://wa.me/" + WHATSAPP_NUMERO + "?text=" + encodeURIComponent(mensagem),
    "_blank"
  );

  emailjs.send("service_tlrn1en", "template_nrzndi4", {
    nome: nome.value,
    telefone: telefone.value,
    valor: valor.value,
    total: total.value,
    prazo: prazo.value,
    localizacao: localizacao.value,
    penhora: penhora.value,
    descricaoPenhor: descricaoPenhor.value
  }).then(() => {
    alert("Pedido enviado com sucesso!");
  }).catch((err) => {
    alert("Erro ao enviar email: " + err);
  });
}
</script>

</body>
</html>
