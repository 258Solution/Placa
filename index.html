      <!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notificação de Venda</title>
  <style>
    body { font-family: Arial; background:#f4f4f4; margin:0; padding:0; }
    .container { max-width:600px; margin:50px auto; background:#fff; padding:20px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.1); }
    input, button { padding:10px; margin:5px 0; width:100%; box-sizing:border-box; }
    button { background:#28a745; color:#fff; border:none; border-radius:5px; cursor:pointer; }
    button:hover { background:#218838; }
  </style>
</head>
<body>

<div class="container">
  <h2>Registrar Venda</h2>
  <form id="saleForm">
    <input type="text" id="client_name" placeholder="Nome do cliente" required>
    <input type="email" id="client_email" placeholder="Email do cliente" required>
    <input type="number" id="sale_amount" placeholder="Valor da venda (MT$)" value="120" required>
    <button type="submit">Enviar Notificação</button>
  </form>
</div>

<script src="https://cdn.emailjs.com/dist/email.min.js"></script>
<script>
  emailjs.init("RLXkiuuqrtbVht4uM"); // Sua Public Key

  const form = document.getElementById('saleForm');

  form.addEventListener('submit', function(e){
    e.preventDefault();

    const name = document.getElementById('client_name').value;
    const email = document.getElementById('client_email').value;
    const amount = document.getElementById('sale_amount').value;

    // Mensagem de notificação
    const message = `Olá ${name}, sua compra foi realizada com sucesso no valor de ${amount} MT$. Obrigado por confiar em nós!`;

    emailjs.send("service_tlrn1en", "template_nrzndi4", {
      user_name: name,
      user_email: email,
      notification_message: message
    })
    .then(response => {
      alert("Notificação de venda enviada com sucesso!");
      form.reset();
      console.log("SUCCESS!", response.status, response.text);
    })
    .catch(error => {
      alert("Erro ao enviar notificação.");
      console.log("FAILED...", error);
    });
  });
</script>

</body>
</html>
